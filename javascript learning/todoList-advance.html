<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles/11-todo.css">
</head>
<body>
   <p>Todo List</p>
   <div class="todo-input-grid">
   <input placeholder="todo list" class="js-input-place name-input">

   <input type="date"
   class="js-due-date-input due-date-input">

   <button onclick="
   addtodo();
   " class="add-todo-button">Add</button>
   </div>

   <div class="js-name-input todo-grid"></div>
    
    <script>
        const todoList=[{ //to give the data as well as the date in same time so we are grouping through object
            name:'wash clothes',
            dueDate:'2022-12-22'
        },{
            name:'eat dinner',
            dueDate:'2022-12-26'
        }];

        rendertodoList();//mainly used to show the data by converting that data into html

        function rendertodoList(){
        let todoHTML='';

        for(let i=0;i<todoList.length;i++){
            const todoObject=todoList[i];
            //const name=todoObject.name;
            //const dueDate=todoObject.dueDate;
            const{name,dueDate}=todoObject;
            const html=`
            <div>${name} </div>
            <div>${dueDate}</div>
                <button onclick="
                todoList.splice(${i},1);
                rendertodoList();
                " class="delete-todo-button">Delete</button>
            
            `;
            todoHTML+=html;
        }
        console.log(todoHTML);

        document.querySelector('.js-name-input')
        .innerHTML=todoHTML;
        }

        function addtodo(){
             //it will occur after add button clicked

            const inputElement = document.querySelector('.js-input-place');

            const name = inputElement.value;

            const dateInputElement = document.querySelector('.js-due-date-input');

            const dueDate = dateInputElement.value;
            todoList.push({
                //name:name,
                //dueDate:dueDate
                name,
                dueDate
            });
            console.log(todoList);

            inputElement.value='';
            rendertodoList()//again it have to re-reads array,re-builds html,re-display updated list
        }

        
    </script>

    
</body>
</html>
